name: Build Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore BananaManagerInstallerApp/BananaManagerInstallerApp.csproj
    
    - name: Build and Publish
      run: |
        dotnet publish BananaManagerInstallerApp/BananaManagerInstallerApp.csproj `
          -c Release `
          -o publish `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:PublishTrimmed=false `
          -p:SelfContained=true `
          -r win-x64
    
    - name: Create Release Artifact
      run: |
        $zipPath = "BananaManagerInstaller.zip"
        Compress-Archive -Path publish\* -DestinationPath $zipPath
        echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ${{ env.ZIP_PATH }}
        asset_name: BananaManagerInstaller-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip
    
    - name: Upload Executable
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: publish/BananaManagerInstallerApp.exe
        asset_name: BananaManagerInstaller-${{ github.event.release.tag_name }}.exe
        asset_content_type: application/octet-stream
